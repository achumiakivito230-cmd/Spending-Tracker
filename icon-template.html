<html>
<head>
  <style>
    * { margin:0; padding:0; }
    html, body { width:100vw; height:100vh; background: transparent; }
    .icon {
      width:100vw; height:100vh;
      background:#0D0D0F;
      border-radius:22%;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    .glow {
      position:absolute; width:75%; height:75%; border-radius:50%;
      background:radial-gradient(circle, rgba(200,255,0,0.28) 0%, transparent 70%);
    }
    .symbol {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size:58vw; font-weight:700;
      color:#C8FF00; line-height:1; position:relative; z-index:1;
      text-shadow: 0 0 15vw rgba(200,255,0,0.8), 0 0 30vw rgba(200,255,0,0.4);
    }
  </style>
</head>
<body>
  <div class="icon">
    <div class="glow"></div>
    <div class="symbol">₹</div>
  </div>
</body>
</html>
